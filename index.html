<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0"> <!-- displays site properly based on user's device -->

  <link rel="icon" type="image/png" sizes="32x32" href="./images/favicon-32x32.png">
  <link rel="stylesheet" href="./styles.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&family=Lexend+Deca&display=swap" rel="stylesheet">
  
  <title>Frontend Mentor | Stats preview card component</title>

  <!-- Feel free to remove these styles or customise in your own stylesheet 👍 -->
  <style>
    .attribution { font-size: 0.6875rem; text-align: center; }
    .attribution a { color: hsl(228, 45%, 44%); }
  </style>
</head>
<body>
  <div class="card">
    <div class="card-img">
      <picture>
        <source media="(max-width: 767px)" srcset="./images/image-header-mobile.jpg">
        <source media="(min-width: 1023px)" srcset="./images/image-header-desktop.jpg">
        <img class="people-working" src="./images/image-header-mobile.jpg" alt="Image of people working">
      </picture>
    </div>

    <div class="insights">
      <h1 class="insights-heading">
        Get <span class="insights-text">insights</span> that help your business grow.
      </h1>

      <p class="insights-info">
        Discover the benefits of data analytics and make better decisions regarding revenue, customer 
          experience, and overall efficiency.
      </p>

      <div class="stats">
        <div class="stat-num-and-description">
          <p class="stat-num"><b>10k+</b></p>
          <p class="description">COMPANIES</p>
        </div>

        <div class="stat-num-and-description">
          <p class="stat-num"><b>314</b></p>
          <p class="description">TEMPLATE</p>
        </div>

        <div class="stat-num-and-description">
          <p class="stat-num"><b>12M+</b></p>
          <p class="description">QUERIES</p>
        </div>

      </div>
    </div>
  </div>

  <footer class="attribution">
    Challenge by <a href="https://www.frontendmentor.io?ref=challenge">Frontend Mentor</a>. 
    Coded by <a href="#">Sihle Makhunga</a>.
  </footer>
</body>
</html>
